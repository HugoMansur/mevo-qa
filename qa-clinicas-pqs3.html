<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mevo — Clínicas PQS2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-bg:#1a1a2e;
  --sidebar-accent:#16213e;
  --card-bg:#ffffff;
  --body-bg:#f0f2f5;
  --accent:#7c3aed;
  --accent-dark:#6d28d9;
  --green:#10b981;
  --green-light:#d1fae5;
  --red:#ef4444;
  --red-light:#fee2e2;
  --amber:#f59e0b;
  --amber-light:#fef3c7;
  --blue:#0ea5e9;
  --blue-light:#e0f2fe;
  --violet:#7c3aed;
  --violet-light:#ede9fe;
  --sky:#0ea5e9;
  --sky-light:#e0f2fe;
  --emerald:#10b981;
  --emerald-light:#d1fae5;
  --rose:#f43f5e;
  --rose-light:#ffe4e6;
  --pink:#ec4899;
  --pink-light:#fce7f3;
  --teal:#14b8a6;
  --teal-light:#ccfbf1;
  --purple:#a855f7;
  --purple-light:#f3e8ff;
  --text-primary:#1e293b;
  --text-secondary:#64748b;
  --text-muted:#94a3b8;
  --border:#e2e8f0;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
  --radius:12px;
  --radius-sm:8px;
  --transition:all .2s ease;
}
html{font-size:15px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--body-bg);color:var(--text-primary);display:flex;min-height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:280px;min-width:280px;background:var(--sidebar-bg);color:#e2e8f0;display:flex;flex-direction:column;padding:0;height:100vh;overflow-y:auto;z-index:10}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-header h1{font-size:1.15rem;font-weight:700;color:#fff;letter-spacing:-.02em}
.sidebar-header p{font-size:.75rem;color:var(--text-muted);margin-top:4px}

/* Filters */
.filter-section{padding:16px 20px}
.filter-section h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:10px;font-weight:600}
.filter-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;background:transparent;color:#cbd5e1;font-size:.82rem;cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition);text-align:left}
.filter-btn:hover{background:rgba(255,255,255,.06)}
.filter-btn.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600}
.filter-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.filter-dot.new{background:var(--text-muted)}
.filter-dot.approved{background:var(--green)}
.filter-dot.rejected{background:var(--red)}
.filter-dot.maybe{background:var(--amber)}
.filter-count{margin-left:auto;font-size:.72rem;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:10px;min-width:24px;text-align:center}

/* Progress ring */
.progress-section{padding:20px;display:flex;flex-direction:column;align-items:center;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
.progress-ring-container{position:relative;width:100px;height:100px}
.progress-ring{transform:rotate(-90deg)}
.progress-ring-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:8}
.progress-ring-fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.progress-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.4rem;font-weight:700;color:#fff}
.progress-label{margin-top:8px;font-size:.75rem;color:var(--text-muted)}

/* Stats */
.stats-section{padding:16px 20px}
.stat-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.82rem;color:#cbd5e1}
.stat-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stat-row .val{margin-left:auto;font-weight:700;color:#fff}

/* Export */
.export-section{padding:16px 20px;margin-top:auto;border-top:1px solid rgba(255,255,255,.06)}
.export-btn{width:100%;padding:12px;border:none;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
.export-btn.primary{background:var(--accent);color:#fff}
.export-btn.primary:hover{background:var(--accent-dark)}
.export-btn.secondary{background:rgba(255,255,255,.06);color:#cbd5e1;margin-top:8px}
.export-btn.secondary:hover{background:rgba(255,255,255,.12)}

/* Keyboard hints */
.shortcuts-section{padding:12px 20px 20px;border-top:1px solid rgba(255,255,255,.06)}
.shortcuts-section h3{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.shortcut-row{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--text-muted);padding:3px 0}
.kbd{background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;font-size:.68rem;font-family:monospace;color:#cbd5e1;border:1px solid rgba(255,255,255,.12)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Top bar */
.topbar{display:flex;align-items:center;padding:16px 32px;background:#fff;border-bottom:1px solid var(--border);gap:16px;flex-shrink:0}
.topbar-nav{display:flex;gap:8px}
.nav-btn{width:40px;height:40px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);font-size:1.1rem;color:var(--text-secondary)}
.nav-btn:hover{background:var(--body-bg);border-color:var(--text-muted)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.topbar-counter{font-size:.85rem;color:var(--text-secondary);font-weight:500;margin-left:4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.undo-btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.8rem;color:var(--text-secondary);transition:var(--transition);display:flex;align-items:center;gap:6px}
.undo-btn:hover{background:var(--body-bg)}
.undo-btn:disabled{opacity:.3;cursor:not-allowed}

/* Card area */
.card-area{flex:1;overflow-y:auto;padding:24px 32px;display:flex;justify-content:center;align-items:flex-start}
.card-wrapper{width:100%;max-width:780px}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:cardIn .3s ease}
@keyframes cardIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes cardInReverse{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
.card.reverse{animation-name:cardInReverse}

/* Card header */
.card-header{padding:24px 28px 16px;border-bottom:1px solid var(--border)}
.card-header-top{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.card-title{font-size:1.2rem;font-weight:700;color:var(--text-primary);flex:1;line-height:1.3}
.badge{padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.badge-status{font-size:.68rem}
.badge-new{background:#f1f5f9;color:var(--text-muted)}
.badge-approved{background:var(--green-light);color:#065f46}
.badge-rejected{background:var(--red-light);color:#991b1b}
.badge-maybe{background:var(--amber-light);color:#92400e}
.badge-pqs{background:var(--violet-light);color:#6d28d9}
.card-subtitle{font-size:.88rem;color:var(--text-secondary);margin-top:4px}

/* PEP vendor badge */
.badge-pep{padding:4px 12px;border-radius:20px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.badge-pep-blue{background:var(--blue-light);color:#0369a1}
.badge-pep-green{background:var(--green-light);color:#065f46}
.badge-pep-teal{background:var(--teal-light);color:#0f766e}
.badge-pep-purple{background:var(--purple-light);color:#7e22ce}
.badge-pep-gray{background:#f1f5f9;color:var(--text-muted)}

/* Chips row */
.chips-row{display:flex;flex-wrap:wrap;gap:8px;padding:12px 28px 0}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:500;background:#f1f5f9;color:var(--text-secondary);text-decoration:none;transition:var(--transition);border:none;cursor:default}
a.chip{cursor:pointer}
a.chip:hover{background:var(--blue-light);color:var(--blue)}
.chip-icon{font-size:.85rem}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:16px 28px}
.stat-card{background:#f8fafc;border-radius:var(--radius-sm);padding:14px;text-align:center;border:1px solid var(--border)}
.stat-card .stat-val{font-size:1.3rem;font-weight:800;color:var(--text-primary)}
.stat-card .stat-lbl{font-size:.68rem;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.stat-card.highlight{border-color:var(--accent);background:var(--violet-light)}
.stat-card.stat-warning{border-color:#f59e0b;background:#fef3c7}
.stat-card.stat-warning .stat-val{color:#92400e}
.stat-card.stat-good{border-color:#10b981;background:#d1fae5}
.stat-card.stat-good .stat-val{color:#065f46}

/* Info grid */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 16px;padding:12px 28px}
.info-item{display:flex;justify-content:space-between;font-size:.82rem;padding:4px 0;border-bottom:1px solid var(--border)}
.info-item .info-label{color:var(--text-muted);font-weight:500}
.info-item .info-value{color:var(--text-primary);font-weight:600;text-align:right}

/* Equipamentos section */
.equip-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px 28px}
.equip-card{background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center}
.equip-card .equip-val{font-size:1.1rem;font-weight:700;color:var(--text-primary)}
.equip-card .equip-lbl{font-size:.65rem;color:var(--text-muted);margin-top:2px;text-transform:uppercase;font-weight:600}
.equip-card.has-equip{border-color:var(--accent);background:var(--violet-light)}

/* Operadoras section */
.operadoras-section{padding:0 28px 12px}
.operadoras-section h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.operadoras-box{background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:.78rem;line-height:1.6;color:var(--text-secondary);max-height:80px;overflow:hidden;position:relative;transition:max-height .3s ease;cursor:pointer}
.operadoras-box.expanded{max-height:2000px}
.operadoras-box::after{content:'Clique para expandir';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,#f8fafc);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:.7rem;color:var(--blue);font-weight:600;pointer-events:none}
.operadoras-box.expanded::after{display:none}

/* Description / Mensagem section */
.description-section{padding:0 28px 16px}
.description-section h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.description-box{background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:.84rem;line-height:1.6;color:var(--text-secondary);max-height:120px;overflow:hidden;position:relative;transition:max-height .3s ease;cursor:pointer;white-space:pre-wrap}
.description-box.expanded{max-height:2000px}
.description-box::after{content:'Clique para expandir';position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(transparent,#f8fafc);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:.7rem;color:var(--blue);font-weight:600;pointer-events:none}
.description-box.expanded::after{display:none}

/* PVP Message */
.pvp-section{padding:0 28px 16px}
.pvp-section h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.pvp-section h3 .pvp-toggle{font-size:.7rem;transition:transform .2s ease;display:inline-block}
.pvp-section h3 .pvp-toggle.open{transform:rotate(90deg)}
.pvp-box{background:#f5f3ff;border:1px solid #ddd6fe;border-left:4px solid var(--violet);border-radius:var(--radius-sm);padding:16px 16px 16px 20px;font-size:.84rem;line-height:1.7;color:var(--text-secondary);white-space:pre-wrap;max-height:0;overflow:hidden;opacity:0;transition:max-height .4s ease,opacity .3s ease,padding .3s ease;padding-top:0;padding-bottom:0}
.pvp-box.expanded{max-height:2000px;opacity:1;padding:16px 16px 16px 20px}
.pvp-subject{font-weight:700;color:var(--text-primary);font-size:.88rem;margin-bottom:8px;display:block}

/* Leads section */
.leads-section{padding:0 28px 16px}
.leads-section h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:8px}
.leads-section h3 .leads-count{font-size:.68rem;background:var(--violet-light);color:#6d28d9;padding:2px 8px;border-radius:10px;font-weight:700}
.lead-card{background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;transition:var(--transition)}
.lead-card:last-child{margin-bottom:0}
.lead-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.lead-name{font-size:.88rem;font-weight:700;color:var(--text-primary)}
.lead-cargo{font-size:.75rem;color:var(--text-secondary);background:#f1f5f9;padding:2px 10px;border-radius:12px;font-weight:500}
.lead-pvp-toggle{font-size:.72rem;color:var(--blue);cursor:pointer;font-weight:600;margin-left:auto;user-select:none;display:flex;align-items:center;gap:4px;transition:var(--transition)}
.lead-pvp-toggle:hover{color:#0369a1}
.lead-pvp-content{max-height:0;overflow:hidden;opacity:0;transition:max-height .4s ease,opacity .3s ease,margin .3s ease;margin-top:0}
.lead-pvp-content.expanded{max-height:2000px;opacity:1;margin-top:10px}
.lead-pvp-inner{background:#f5f3ff;border:1px solid #ddd6fe;border-left:4px solid var(--violet);border-radius:var(--radius-sm);padding:12px 14px 12px 16px;font-size:.82rem;line-height:1.7;color:var(--text-secondary);white-space:pre-wrap}
.lead-pvp-subject{font-weight:700;color:var(--text-primary);font-size:.84rem;margin-bottom:6px;display:block}
.lead-linkedin-chip{display:inline-block;padding:3px 10px;background:#e0f2fe;color:#0369a1;border-radius:20px;font-size:.72rem;font-weight:600;text-decoration:none;margin-top:4px;transition:background .15s}
.lead-linkedin-chip:hover{background:#bae6fd}
.lead-email-chip{display:inline-block;padding:3px 10px;background:#d1fae5;color:#065f46;border-radius:20px;font-size:.72rem;font-weight:600;text-decoration:none;margin-top:4px;transition:background .15s}
.lead-email-chip:hover{background:#a7f3d0}

/* Star rating */
.star-rating-section{padding:0 28px 16px}
.star-rating-section h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.star-rating{display:flex;gap:4px}
.star-btn{background:none;border:none;font-size:1.6rem;cursor:pointer;color:#d1d5db;transition:color .15s,transform .15s;padding:2px}
.star-btn:hover{transform:scale(1.2)}
.star-btn.active{color:#f59e0b}
.star-btn.hover-preview{color:#fbbf24}

/* Notes */
.notes-section{padding:0 28px 16px}
.notes-section h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
.notes-textarea{width:100%;min-height:80px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:.84rem;resize:vertical;transition:border-color .2s;color:var(--text-primary);background:#fff}
.notes-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.notes-textarea::placeholder{color:var(--text-muted)}

/* Action buttons */
.action-buttons{display:flex;gap:10px;padding:16px 28px 24px}
.action-btn{flex:1;padding:14px;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:700;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
.action-btn:active{transform:scale(.97)}
.btn-approve{background:var(--green);color:#fff}
.btn-approve:hover{background:#059669;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.btn-reject{background:var(--red);color:#fff}
.btn-reject:hover{background:#dc2626;box-shadow:0 4px 12px rgba(239,68,68,.3)}
.btn-maybe{background:var(--amber);color:#fff}
.btn-maybe:hover{background:#d97706;box-shadow:0 4px 12px rgba(245,158,11,.3)}

/* Enrichment section */
.enrichment-section{padding:12px 28px 16px}
.enrichment-section h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:10px;font-weight:600}
.enrichment-content{display:flex;flex-direction:column;gap:10px}
.badge-cartao{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;background:var(--green-light);color:#065f46}
.badge-cartao-programa{font-size:.75rem;color:var(--text-secondary);margin-top:2px;padding-left:4px}
.noticia-link{font-size:.82rem;color:var(--blue);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:var(--transition)}
.noticia-link:hover{color:#0369a1;text-decoration:underline}
.social-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.social-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:16px;font-size:.72rem;font-weight:600;text-decoration:none;transition:var(--transition);cursor:pointer}
.social-chip:hover{opacity:.85;transform:translateY(-1px)}
.social-chip-instagram{background:var(--pink-light);color:#be185d}
.social-chip-facebook{background:var(--blue-light);color:#1d4ed8}
.social-chip-linkedin{background:#e0e7ff;color:#312e81}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;text-align:center}
.empty-state-icon{font-size:3rem;margin-bottom:16px;opacity:.3}
.empty-state h2{font-size:1.2rem;color:var(--text-secondary);font-weight:600;margin-bottom:8px}
.empty-state p{font-size:.88rem;color:var(--text-muted)}

/* Loading state */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;text-align:center}
.loading-spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:var(--radius-sm);color:#fff;font-size:.85rem;font-weight:600;transform:translateY(100px);opacity:0;transition:all .3s ease;z-index:100;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateY(0);opacity:1}
.toast.green{background:var(--green)}
.toast.red{background:var(--red)}
.toast.amber{background:var(--amber)}
.toast.blue{background:var(--blue)}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{width:240px;min-width:240px}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .equip-grid{grid-template-columns:repeat(3,1fr)}
  .card-area{padding:16px}
  .topbar{padding:12px 16px}
}
@media(max-width:700px){
  body{flex-direction:column}
  .sidebar{width:100%;min-width:100%;height:auto;max-height:50vh;order:2}
  .main{order:1;height:auto;min-height:60vh}
  .progress-section{flex-direction:row;gap:16px;padding:12px 20px}
  .progress-ring-container{width:60px;height:60px}
  .action-buttons{flex-direction:column}
  .equip-grid{grid-template-columns:repeat(3,1fr)}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Mevo &#8212; Cl&#237;nicas PQS2</h1>
    <p>Policl&#237;nica sobrecarregada (V2)</p>
  </div>

  <div class="filter-section">
    <h3>Status</h3>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
      <span class="filter-dot" style="background:#fff"></span>
      Todos
      <span class="filter-count" id="filterCountAll">0</span>
    </button>
    <button class="filter-btn" data-filter="new" onclick="setFilter('new')">
      <span class="filter-dot new"></span>
      Novo

<script>
// =================================================================
// SUPABASE CONFIG
// =================================================================
const SUPABASE_URL = 'https://dzsvbklojjvmjwcizkxi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6c3Zia2xvamp2bWp3Y2l6a3hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MzY2OTMsImV4cCI6MjA5MDQxMjY5M30.jzE0RhN4UWEH13dUNqFY2XtPbnyXwuE_d_FvDVFjg88';

async function supaFetch(path, options = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const prefer = options.method === 'POST' ? 'resolution=merge-duplicates,return=minimal'
    : options.method === 'DELETE' ? 'return=minimal'
    : 'return=representation';
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': prefer
  };
  const res = await fetch(url, { method: options.method || 'GET', headers, body: options.body });
  if (!res.ok) {
    const txt = await res.text();
    console.error('Supabase error:', res.status, txt);
    throw new Error(`Supabase ${res.status}: ${txt}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

// =================================================================
// STATE
// =================================================================
let CLINICAS_RAW = [];
let clinicasReviews = {};
let leadsByClinica = {};

let currentFilter = 'all';
let currentIndex = 0;
let filteredIndices = [];
let undoStack = [];
let navDirection = 1;
let notesSaveTimer = null;
let dataLoaded = false;

function getItemKey(item) {
  return item.cnes || item.nome || '';
}

function getReview(idx) {
  const key = getItemKey(CLINICAS_RAW[idx]);
  return clinicasReviews[key] || { status: 'new', notes: '', rating: 0, reviewed_at: '' };
}

// =================================================================
// SUPABASE PERSISTENCE
// =================================================================
async function loadReviewsFromSupabase() {
  try {
    const clinRevs = await supaFetch('mevo_clinicas_pqs3_reviews?select=*');
    clinicasReviews = {};
    (clinRevs || []).forEach(r => {
      clinicasReviews[r.cnes] = {
        status: r.status || 'new',
        notes: r.notes || '',
        rating: r.rating || 0,
        reviewed_at: r.reviewed_at || ''
      };
    });
  } catch(e) {
    console.warn('Failed to load reviews from Supabase, using empty state', e);
  }
}

async function loadLeadsFromSupabase() {
  try {
    const leads = await supaFetch('mevo_leads_clinicas_pqs3?select=*');
    leadsByClinica = {};
    (leads || []).forEach(lead => {
      const key = (lead.empresa || '').trim();
      if (!key) return;
      if (!leadsByClinica[key]) leadsByClinica[key] = [];
      leadsByClinica[key].push({
        nome: lead.lead_nome || '',
        cargo: lead.cargo || '',
        linkedin_lead: lead.linkedin_lead || '',
        work_email: lead.work_email || '',
        pvp_assunto: lead.pvp_assunto || '',
        pvp_mensagem: lead.pvp_mensagem || ''
      });
    });
  } catch(e) {
    console.warn('Failed to load leads from Supabase', e);
  }
}

async function saveReviewToSupabase(key, review) {
  try {
    await supaFetch('mevo_clinicas_pqs3_reviews', {
      method: 'POST',
      body: JSON.stringify({
        cnes: key,
        status: review.status,
        notes: review.notes || '',
        rating: review.rating || 0,
        reviewed_at: review.reviewed_at,
        updated_at: new Date().toISOString()
      })
    });
  } catch(e) {
    console.warn('Failed to save review to Supabase', e);
  }
}

function setReview(idx, status, notes, rating) {
  const key = getItemKey(CLINICAS_RAW[idx]);
  const prev = clinicasReviews[key] ? {...clinicasReviews[key]} : { status: 'new', notes: '', rating: 0, reviewed_at: '' };
  undoStack.push({ key, prev: {...prev} });
  if (undoStack.length > 50) undoStack.shift();
  clinicasReviews[key] = {
    status,
    notes: notes !== undefined ? notes : prev.notes,
    rating: rating !== undefined ? rating : prev.rating,
    reviewed_at: new Date().toISOString()
  };
  document.getElementById('undoBtn').disabled = false;
  saveReviewToSupabase(key, clinicasReviews[key]);
}

// =================================================================
// FILTERING
// =================================================================
function buildFilteredIndices() {
  filteredIndices = [];
  for (let i = 0; i < CLINICAS_RAW.length; i++) {
    const key = getItemKey(CLINICAS_RAW[i]);
    const s = (clinicasReviews[key] || { status: 'new' }).status;
    if (currentFilter !== 'all' && currentFilter !== s) continue;
    filteredIndices.push(i);
  }
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  buildFilteredIndices();
  currentIndex = 0;
  renderCard();
  updateSidebar();
}

// =================================================================
// NAVIGATION
// =================================================================
function navigate(dir) {
  if (filteredIndices.length === 0) return;
  navDirection = dir;
  currentIndex = Math.max(0, Math.min(filteredIndices.length - 1, currentIndex + dir));
  renderCard();
  updateNav();
}

function updateNav() {
  document.getElementById('btnPrev').disabled = currentIndex <= 0;
  document.getElementById('btnNext').disabled = currentIndex >= filteredIndices.length - 1;
  document.getElementById('topbarCounter').textContent = filteredIndices.length > 0
    ? `${currentIndex + 1} / ${filteredIndices.length}`
    : '0 / 0';
}

// =================================================================
// UNDO
// =================================================================
function undo() {
  if (undoStack.length === 0) return;
  const action = undoStack.pop();
  if (action.prev.status === 'new' && !action.prev.notes && !action.prev.rating) {
    delete clinicasReviews[action.key];
  } else {
    clinicasReviews[action.key] = action.prev;
  }
  saveReviewToSupabase(action.key, action.prev.status === 'new' && !action.prev.notes && !action.prev.rating
    ? { status: 'new', notes: '', rating: 0, reviewed_at: '' }
    : action.prev
  );

  document.getElementById('undoBtn').disabled = undoStack.length === 0;
  buildFilteredIndices();
  if (currentIndex >= filteredIndices.length) currentIndex = Math.max(0, filteredIndices.length - 1);
  renderCard();
  updateSidebar();
  showToast('Acao desfeita', 'blue');
}

// =================================================================
// FORMATTING HELPERS
// =================================================================
function fmt(n) {
  if (n == null || n === '') return '--';
  const num = Number(n);
  if (isNaN(num)) return String(n);
  return num.toLocaleString('pt-BR');
}

function pct(n) {
  if (n == null || n === '') return '--';
  const s = String(n);
  if (s.includes('%')) return s;
  const num = Number(n);
  if (isNaN(num)) return s;
  if (Math.abs(num) > 1) return num.toFixed(1) + '%';
  return (num * 100).toFixed(1) + '%';
}

function fmtBRL(n) {
  if (n == null || n === '') return '--';
  const num = Number(n);
  if (isNaN(num)) return String(n);
  return 'R$ ' + num.toLocaleString('pt-BR', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

function statusBadge(status) {
  const map = {
    new: ['Novo', 'badge-new'],
    approved: ['Aprovado', 'badge-approved'],
    rejected: ['Rejeitado', 'badge-rejected'],
    maybe: ['Talvez', 'badge-maybe']
  };
  const [label, cls] = map[status] || map.new;
  return `<span class="badge badge-status ${cls}">${label}</span>`;
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// =================================================================
// PEP VENDOR BADGE
// =================================================================
function pepVendorBadge(vendor) {
  if (!vendor || vendor === '--') return '';
  const v = vendor.trim();
  let cls = 'badge-pep-gray';
  if (/^Tasy$/i.test(v)) {
    cls = 'badge-pep-blue';
  } else if (/^(MV|SOUL\s*MV)$/i.test(v)) {
    cls = 'badge-pep-green';
  } else if (/^(Feegow|Memed|ProntLife)$/i.test(v)) {
    cls = 'badge-pep-teal';
  } else if (/^Sistema\s+pr.prio$/i.test(v)) {
    cls = 'badge-pep-purple';
  } else if (/^N.o\s+detectado$/i.test(v)) {
    cls = 'badge-pep-gray';
  }
  return `<span class="badge-pep ${cls}">&#128187; ${escapeHtml(v)}</span>`;
}

// =================================================================
// STAR RATING
// =================================================================
function starRatingHtml(rating, realIdx) {
  let html = '<div class="star-rating" onmouseleave="clearStarHover()">';
  for (let i = 1; i <= 5; i++) {
    const active = i <= rating ? ' active' : '';
    html += `<button class="star-btn${active}" data-star="${i}" data-idx="${realIdx}" onclick="setStarRating(${realIdx}, ${i})" onmouseenter="previewStar(${i})">&#9733;</button>`;
  }
  html += '</div>';
  return html;
}

function previewStar(n) {
  document.querySelectorAll('.star-btn').forEach(btn => {
    const s = parseInt(btn.dataset.star);
    btn.classList.toggle('hover-preview', s <= n && !btn.classList.contains('active'));
  });
}

function clearStarHover() {
  document.querySelectorAll('.star-btn').forEach(btn => btn.classList.remove('hover-preview'));
}

function setStarRating(realIdx, rating) {
  const key = getItemKey(CLINICAS_RAW[realIdx]);
  const current = clinicasReviews[key] || { status: 'new', notes: '', rating: 0, reviewed_at: '' };
  const newRating = current.rating === rating ? 0 : rating;
  clinicasReviews[key] = { ...current, rating: newRating, reviewed_at: new Date().toISOString() };
  saveReviewToSupabase(key, clinicasReviews[key]);
  document.querySelectorAll('.star-btn').forEach(btn => {
    const s = parseInt(btn.dataset.star);
    btn.classList.toggle('active', s <= newRating);
  });
}

      <div class="info-item"><span class="info-label">% Cl&#237;nicos Gerais</span><span class="info-value">${pct(d.pct_clinicos)}</span></div>
      <div class="info-item"><span class="info-label">Vol. Exames Lab</span><span class="info-value">${fmt(d.vol_exames_lab)}</span></div>
      <div class="info-item"><span class="info-label">Vol. Exames Imagem</span><span class="info-value">${fmt(d.vol_exames_imagem)}</span></div>
      <div class="info-item"><span class="info-label">Diagn&#243;stico Privado</span><span class="info-value">${fmt(d.sadt_priv)}</span></div>
      <div class="info-item"><span class="info-label">Confian&#231;a do Modelo</span><span class="info-value">${escapeHtml(d.confidence || '--')}</span></div>
      <div class="info-item"><span class="info-label">Tipo de Atendimento</span><span class="info-value">${escapeHtml(d.tipo_atendimento || '--')}</span></div>
      <div class="info-item"><span class="info-label">Foco do PQS</span><span class="info-value">${escapeHtml(d.pqs_focus || '--')}</span></div>
      <div class="info-item"><span class="info-label">Faixa de Volume (min-max)</span><span class="info-value">${fmt(d.range_lo)} - ${fmt(d.range_hi)}</span></div>
      <div class="info-item"><span class="info-label">PEP (Sistema)</span><span class="info-value">${escapeHtml(d.pep_vendor || '--')}</span></div>
      <div class="info-item"><span class="info-label">Natureza Jur&#237;dica</span><span class="info-value">${escapeHtml(d.tipo_natureza || '--')}</span></div>
    </div>

    ${opList ? `
    <div class="operadoras-section" style="padding-top:12px">
      <h3>Operadoras ANS (${fmt(d.ans_qnt_operadoras)})</h3>
      <div class="operadoras-box" onclick="this.classList.toggle('expanded')">${escapeHtml(opList)}</div>
    </div>` : ''}

    ${renderEnrichmentSection(d)}

    ${renderLeadsSection(d.nome)}

    <div class="star-rating-section" style="padding-top:16px">
      <h3>Rating</h3>
      ${starRatingHtml(review.rating, realIdx)}
    </div>

    <div class="notes-section">
      <h3>Observacoes do Revisor</h3>
      <textarea class="notes-textarea" placeholder="Adicione suas observacoes aqui..." data-idx="${realIdx}" oninput="debounceSaveNotes(this)">${escapeHtml(review.notes)}</textarea>
    </div>

    <div class="action-buttons">
      <button class="action-btn btn-approve" onclick="doAction('approved')">&#10003; Aprovar</button>
      <button class="action-btn btn-reject" onclick="doAction('rejected')">&#10007; Rejeitar</button>
      <button class="action-btn btn-maybe" onclick="doAction('maybe')">&#8212; Talvez</button>
    </div>
  </div>`;
}

// =================================================================
// RENDER CARD (dispatch)
// =================================================================
function renderCard() {
  const area = document.getElementById('cardArea');
  if (!dataLoaded) return;

  if (filteredIndices.length === 0) {
    area.innerHTML = `<div class="card-wrapper"><div class="card"><div class="empty-state">
      <div class="empty-state-icon">&#128269;</div>
      <h2>Nenhuma clinica encontrada</h2>
      <p>Nao ha itens com esse filtro.</p>
    </div></div></div>`;
    updateNav();
    return;
  }

  const realIdx = filteredIndices[currentIndex];
  const d = CLINICAS_RAW[realIdx];
  const review = getReview(realIdx);

  const html = renderClinicaCard(d, review, realIdx);
  area.innerHTML = `<div class="card-wrapper">${html}</div>`;
  updateNav();
}

// =================================================================
// ACTIONS
// =================================================================
function doAction(status) {
  if (filteredIndices.length === 0) return;
  const realIdx = filteredIndices[currentIndex];
  const ta = document.querySelector('.notes-textarea');
  const notes = ta ? ta.value : getReview(realIdx).notes;
  const rating = getReview(realIdx).rating;
  setReview(realIdx, status, notes, rating);

  const labels = { approved: 'Aprovado', rejected: 'Rejeitado', maybe: 'Talvez' };
  const colors = { approved: 'green', rejected: 'red', maybe: 'amber' };
  showToast(labels[status], colors[status]);

  buildFilteredIndices();
  if (currentFilter !== 'all' && currentFilter !== status) {
    if (currentIndex >= filteredIndices.length) currentIndex = Math.max(0, filteredIndices.length - 1);
  } else {
    if (currentIndex < filteredIndices.length - 1) {
      navDirection = 1;
      currentIndex++;
    }
  }
  renderCard();
  updateSidebar();
}

// =================================================================
// NOTES DEBOUNCE
// =================================================================
function debounceSaveNotes(el) {
  clearTimeout(notesSaveTimer);
  notesSaveTimer = setTimeout(() => {
    const idx = parseInt(el.dataset.idx);
    const key = getItemKey(CLINICAS_RAW[idx]);
    if (!clinicasReviews[key]) clinicasReviews[key] = { status: 'new', notes: '', rating: 0, reviewed_at: '' };
    clinicasReviews[key].notes = el.value;
    saveReviewToSupabase(key, clinicasReviews[key]);
  }, 400);
}

// =================================================================
// SIDEBAR UPDATE
// =================================================================
function updateSidebar() {
  let counts = { new: 0, approved: 0, rejected: 0, maybe: 0 };
  for (let i = 0; i < CLINICAS_RAW.length; i++) {
    const key = getItemKey(CLINICAS_RAW[i]);
    const s = (clinicasReviews[key] || { status: 'new' }).status;
    counts[s] = (counts[s] || 0) + 1;
  }
  const total = CLINICAS_RAW.length;
  const reviewed = total - counts.new;
  const pctDone = total > 0 ? Math.round((reviewed / total) * 100) : 0;

  document.getElementById('filterCountAll').textContent = total;
  document.getElementById('filterCountNew').textContent = counts.new;
  document.getElementById('filterCountApproved').textContent = counts.approved;
  document.getElementById('filterCountRejected').textContent = counts.rejected;
  document.getElementById('filterCountMaybe').textContent = counts.maybe;

  document.getElementById('statApproved').textContent = counts.approved;
  document.getElementById('statRejected').textContent = counts.rejected;
  document.getElementById('statMaybe').textContent = counts.maybe;

  const circumference = 2 * Math.PI * 42;
  const offset = circumference - (pctDone / 100) * circumference;
  document.getElementById('progressRing').style.strokeDashoffset = offset;
  document.getElementById('progressText').textContent = pctDone + '%';
}

// =================================================================
// TOAST
// =================================================================
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + color + ' show';
  setTimeout(() => t.classList.remove('show'), 1800);
}

// =================================================================
// EXPORT CSV
// =================================================================
function exportCSV() {
  if (CLINICAS_RAW.length === 0) return;

  const rows = [['key', 'nome', 'status', 'rating', 'observacoes', 'revisado_em']];
  for (let i = 0; i < CLINICAS_RAW.length; i++) {
    const key = getItemKey(CLINICAS_RAW[i]);
    const r = clinicasReviews[key] || { status: 'new', notes: '', rating: 0, reviewed_at: '' };
    rows.push([
      `"${(key || '').replace(/"/g, '""')}"`,
      `"${(CLINICAS_RAW[i].nome || '').replace(/"/g, '""')}"`,
      r.status,
      r.rating || 0,
      `"${(r.notes || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`,
      r.reviewed_at || ''
    ]);
  }

  const csv = '\ufeff' + rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mevo_clinicas_pqs2_qa_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exportado', 'blue');
}

// =================================================================
// RESET
// =================================================================
function resetAllReviews() {
  if (!confirm('Tem certeza? Isso vai apagar todas as revisoes de clinicas.')) return;
  supaFetch('mevo_clinicas_pqs3_reviews?cnes=neq.IMPOSSIBLE_VALUE_NEVER_MATCH', { method: 'DELETE' }).catch(e => console.warn(e));
  clinicasReviews = {};
  undoStack = [];
  document.getElementById('undoBtn').disabled = true;
  buildFilteredIndices();
  currentIndex = 0;
  renderCard();
  updateSidebar();
  showToast('Revisoes limpas', 'blue');
}

// =================================================================
// KEYBOARD SHORTCUTS
// =================================================================
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
    if (e.key === 'Escape') e.target.blur();
    return;
  }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; }
  if (['1','2','3','4','5'].includes(e.key) && !e.ctrlKey && !e.altKey && !e.metaKey) {
    e.preventDefault();
    if (filteredIndices.length === 0) return;
    const realIdx = filteredIndices[currentIndex];
    setStarRating(realIdx, parseInt(e.key));
    return;
  }
  switch(e.key) {
    case 'ArrowLeft':  e.preventDefault(); navigate(-1); break;
    case 'ArrowRight': e.preventDefault(); navigate(1);  break;
    case 'ArrowUp': case 'a': case 'A':
      e.preventDefault(); doAction('approved'); break;
    case 'ArrowDown': case 'r': case 'R':
      e.preventDefault(); doAction('rejected'); break;
    case 'm': case 'M':
      e.preventDefault(); doAction('maybe'); break;
  }
});

// =================================================================
// INIT
// =================================================================
async function init() {
  try {
    const [clinicas] = await Promise.all([
      supaFetch('mevo_clinicas_pqs3?select=*&order=pqs3_ranking_score.desc'),
      loadLeadsFromSupabase()
    ]);
    CLINICAS_RAW = clinicas || [];

    await loadReviewsFromSupabase();

    dataLoaded = true;
    buildFilteredIndices();
    renderCard();
    updateSidebar();

    const leadsTotal = Object.values(leadsByClinica).reduce((sum, arr) => sum + arr.length, 0);
    showToast(`${CLINICAS_RAW.length} clinicas, ${leadsTotal} leads carregados`, 'blue');
  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('cardArea').innerHTML = `<div class="card-wrapper"><div class="card"><div class="empty-state">
      <div class="empty-state-icon">&#9888;</div>
      <h2>Erro ao carregar dados</h2>
      <p>${escapeHtml(e.message)}</p>
      <p style="margin-top:12px;font-size:.8rem;color:var(--text-muted)">Verifique a conexao com o Supabase e recarregue a pagina.</p>
    </div></div></div>`;
  }
}

init();
</script>
